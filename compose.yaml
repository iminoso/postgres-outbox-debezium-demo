name: postgres-outbox-debezium-demo

services:
  database:
    image: postgres:17.2
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    networks: [demo-network]
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: worker_service
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: local_app_password
    volumes:
      - database-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  database-ui:
    image: dpage/pgadmin4:9.1
    networks: [demo-network]
    depends_on:
      database:
        condition: service_healthy
    ports: ["8889:80"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: local_pgadmin_password

  broker:
    image: confluentinc/cp-kafka:7.7.1
    networks: [demo-network]
    ports: ["9092:9092"]
    environment:
      # Single-node KRaft mode; no ZooKeeper service is needed.
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENERS: PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - broker-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server broker:29092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

  connect:
    image: debezium/connect:3.0.0.Final
    networks: [demo-network]
    depends_on:
      database:
        condition: service_healthy
      broker:
        condition: service_healthy
    ports: ["8083:8083"]
    environment:
      BOOTSTRAP_SERVERS: broker:29092
      GROUP_ID: postgres-outbox-demo-connect
      CONFIG_STORAGE_TOPIC: postgres_outbox_connect_configs
      OFFSET_STORAGE_TOPIC: postgres_outbox_connect_offsets
      STATUS_STORAGE_TOPIC: postgres_outbox_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1

  console:
    image: provectuslabs/kafka-ui:v0.7.2
    networks: [demo-network]
    depends_on:
      broker:
        condition: service_healthy
    ports: ["8888:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: postgres-outbox-demo
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:29092
      SERVER_PORT: 8080

networks:
  demo-network:

volumes:
  database-data:
  broker-data:
